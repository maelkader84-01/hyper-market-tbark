<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هايبر ماركت - خدمة الدليفري السريع</title>
    <!-- استيراد الخطوط وأيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-red: #e63946;
            --dark-red: #a00000;
            --yellow-gold: #ffb703;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #600000, #c00000, #e63946);
            background-attachment: fixed;
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية اللوجو - تم تركها فارغة لإضافة لوجو مستقبلاً */
        .header {
            width: 100%;
            padding: 30px; /* مسافة علوية مناسبة */
            text-align: center;
        }

        /* قسم البنر الإعلاني */
        .banner {
            width: 90%;
            max-width: 800px;
            height: 250px;
            background: url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') no-repeat center center;
            background-size: cover;
            border-radius: 30px;
            margin: 0px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.2);
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 27px;
        }

        .banner-text {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .banner-text h1 {
            font-size: 2.2rem;
            color: var(--white);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* حاوية الدليفري */
        .delivery-card {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .delivery-title {
            font-size: 1.6rem;
            margin-bottom: 30px;
            color: var(--yellow-gold);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .phone-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-delivery {
            background: var(--white);
            color: var(--dark-red);
            text-decoration: none;
            padding: 20px;
            border-radius: 22px;
            font-size: 1.4rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .btn-delivery i {
            font-size: 1.7rem;
            color: var(--main-red);
        }

        .btn-delivery:hover {
            transform: translateY(-5px);
            background: var(--yellow-gold);
            color: #000;
        }

        .social-media {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-media a {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-media a:hover {
            background: var(--white);
            color: var(--main-red);
            transform: scale(1.1) rotate(10deg);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .banner { height: 180px; }
            .banner-text h1 { font-size: 1.5rem; }
            .btn-delivery { font-size: 1.2rem; }
            .header { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- قسم اللوجو (فارغ حالياً) -->
    <header class="header">
        <div class="logo">
            <!-- يمكنك وضع <img src="logo.png"> هنا لاحقاً -->
        </div>
    </header>

    <!-- البنر الاحترافي -->
    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-text">
            <h1>عروض الهايبر ماركت أسواق تبارك</h1>
            <p style="color: var(--yellow-gold); font-weight: bold; font-size: 1.1rem; margin-top: 5px;">أسرع توصيل للمنازل</p>
        </div>
    </div>

    <!-- كارت الدليفري -->
    <div class="delivery-card">
        <div class="delivery-title">
            <i class="fas fa-truck"></i>
            أرقام الدليفري
        </div>

        <div class="phone-buttons">
            <a href="tel:01234567891" class="btn-delivery">
                <i class="fas fa-motorcycle"></i>
                <span>01234567891</span>
            </a>

            <a href="tel:01023456789" class="btn-delivery">
                <i class="fas fa-motorcycle"></i>
                <span>01023456789</span>
            </a>
        </div>

        <div class="social-media">
            <a href="#" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/201234567891" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" title="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <footer>
        &copy; 2026 هايبر ماركت اسواق تبارك- جودة نثق بها
    </footer>

</body>
</html>
