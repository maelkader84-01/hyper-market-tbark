<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هايبر ماركت أسواق تبارك - عروضنا وخدمة التوصيل</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/maelkader84-01/hyper-market-tbark/refs/heads/main/photo/pngegg%20(5).ico">
    <!-- استيراد الخطوط وأيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-red: #e63946;
            --dark-red: #a00000;
            --yellow-gold: #ffb703;
            --whatsapp-green: #25D366; /* لون الواتساب الرسمي */
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #600000, #c00000, #e63946);
            background-attachment: fixed;
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية اللوجو (فارغة بناءً على طلبك) */
        .header {
            width: 100%;
            padding: 25px;
            text-align: center;
        }

        /* قسم البنر الإعلاني */
        .banner {
            width: 90%;
            max-width: 800px;
            height: 250px;
            background: url('photo/banne.jpg') no-repeat center center;
            background-size: cover;
            border-radius: 30px;
            margin: 0px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.2);
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 27px;
        }

        .banner-text {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .banner-text h1 {
            font-size: 2.2rem;
            color: var(--white);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* حاوية الدليفري والواتساب */
        .delivery-card {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .delivery-title {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: var(--yellow-gold);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .phone-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ستايل أزرار الدليفري */
        .btn-delivery {
            background: var(--white);
            color: var(--dark-red);
            text-decoration: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-delivery i { color: var(--main-red); }

        .btn-delivery:hover {
            transform: translateY(-3px);
            background: var(--yellow-gold);
            color: #000;
        }

        /* ستايل زر الواتساب الجديد */
        .btn-whatsapp-group {
            background: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s ease;
            margin-top: 10px; /* مسافة بسيطة عن أزرار الدليفري */
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .btn-whatsapp-group i {
            font-size: 1.8rem;
        }

        .btn-whatsapp-group:hover {
            transform: scale(1.03);
            background: #1ebe57;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
        }

        /* روابط التواصل الاجتماعي السفلى */
        .social-media {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-media a {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-media a:hover {
            background: var(--white);
            color: var(--main-red);
            transform: translateY(-5px);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .banner { height: 180px; }
            .banner-text h1 { font-size: 1.5rem; }
            .btn-delivery { font-size: 1.1rem; }
            .btn-whatsapp-group { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- الجزء العلوي للوجو -->
    <header class="header">
        <div class="logo">
            <!-- يمكنك إضافة اللوجو هنا مستقبلاً -->
        </div>
    </header>

    <!-- البنر الاحترافي -->
    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-text">
            <h1>هايبر ماركت أسواق تبارك</h1>
            <p style="color: var(--yellow-gold); font-weight: bold; margin-top: 5px;">الجودة التي تستحقها</p>
        </div>
    </div>

    <!-- كارت التواصل -->
    <div class="delivery-card">
        <div class="delivery-title">
            <i class="fas fa-shipping-fast"></i>
            خدمة التوصيل السريع
        </div>

        <div class="phone-buttons">
            <!-- أرقام الدليفري -->
            <a href="tel:01131061673" class="btn-delivery">
                <i class="fas fa-phone-alt"></i>
                <span>01131061673</span>
            </a>

            <a href="tel:01131061674" class="btn-delivery">
                <i class="fas fa-phone-alt"></i>
                <span>01131061674</span>
            </a>

            <!-- زر الواتساب الجديد -->
            <a href="https://chat.whatsapp.com/DX35w3JR9V8EeFSdRZTYvm" class="btn-whatsapp-group">
                <i class="fab fa-whatsapp"></i>
                <span>لمعرفة عروضنا انضم لجروبنا</span>
            </a>
        </div>

        <!-- منصات التواصل الأخرى -->
        <div class="social-media">
            <a href="#" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" title="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <footer>
        &copy; 2026 هايبر ماركت أسواق تبارك - عروضنا دائمًا الأقوى
    </footer>

</body>
</html>
